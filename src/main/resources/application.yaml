spring:
  application:
    name: backend
  profiles:
    active: local
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiry: 3600000       # 1시간 (ms)
  refresh-token-expiry: 2592000000   # 30일 (ms)

solapi:
  api-key: ${SOLAPI_API_KEY:}
  api-secret: ${SOLAPI_API_SECRET:}
  sender: ${SOLAPI_SENDER:}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:}
    allowed-redirect-uris:
      - ${GOOGLE_REDIRECT_URI:}
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:}
    allowed-redirect-uris:
      - ${KAKAO_REDIRECT_URI:}

websocket:
  # WebSocket CORS 허용 오리진 목록 (쉼표 구분)
  # 프로덕션: WEBSOCKET_ALLOWED_ORIGINS 환경변수로 반드시 덮어쓰세요 (예: https://eodigaljido.com)
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

upload:
  # 업로드 파일 저장 경로 (프로덕션: UPLOAD_DIR 환경변수로 절대 경로 설정)
  dir: ${UPLOAD_DIR:uploads}

weather:
  kma-api-key: ${KMA_API_KEY:}
  air-korea-api-key: ${AIR_KOREA_API_KEY:}
  kakao-api-key: ${KAKAO_API_KEY:}