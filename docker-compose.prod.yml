services:
  app:
    build: .
    # host network: 컨테이너가 EC2 호스트 네트워크 직접 사용
    # DB_HOST=127.0.0.1 → EC2에 설치된 MySQL 직접 접근 가능
    network_mode: host
    environment:
      SPRING_PROFILES_ACTIVE: prod
    env_file:
      - .env.prod
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
